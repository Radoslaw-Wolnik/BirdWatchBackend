# ===== Application ====
spring.application.name=BirdWatchBackend

# ===== Datasource =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/birdingdb}
spring.datasource.username=${DB_USER:birdinguser}
spring.datasource.password=${DB_PASSWORD:birdingpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate / PostGIS =====
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== MinIO (S3-compatible storage) =====
app.storage.minio.endpoint=http://localhost:9000
app.storage.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
app.storage.minio.secret-key=${MINIO_SECRET_KEY:miniopass}
app.storage.minio.bucket=birding-media

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:default-dev-secret-change-me-in-production}
app.jwt.expiration-ms=86400000

# ===== Server =====
server.port=${SERVER_PORT:8080}

# ===== OpenAPI =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html